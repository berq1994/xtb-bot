timezone: Europe/Prague
state_dir: .state

# --- Data ---
fmp_api_key: ""
news_per_ticker: 2

benchmarks:
  spy: SPY
  vix: ^VIX

# --- Universe ---
universe:
  - SPY
  - QQQ
  - SMH
  - AMD
  - NVDA
  - TSLA
  - AAPL
  - MSFT
  - META
  - GOOGL

ticker_map:
  # příklad mapování
  # BRK.B: BRK-B
  # BTC: BTC-USD

top_n: 5
alert_threshold_pct: 3.0

# --- Email ---
email_enabled: false
email_sender: ""
email_receiver: ""
gmail_password: ""

# --- Geopolitics RSS ---
geopolitics_rss:
  - https://feeds.bbci.co.uk/news/world/rss.xml
  - https://rss.nytimes.com/services/xml/rss/nyt/World.xml
  - https://www.aljazeera.com/xml/rss/all.xml

geopolitics_source_weight: {}

# --- Portfolio snapshot path (repo relative) ---
portfolio_snapshot_path: portfolio_snapshot/portfolio.yml

# --- Day trading settings ---
daytrade:
  enabled: true
  orb_minutes: 15
  intraday_interval: "5m"
  mean_reversion_vwap_dev_pct: 1.5
  max_trades_per_day: 4
  daily_stop_r: -2.0
  candidates_top_n: 5
  charts_top_n: 3