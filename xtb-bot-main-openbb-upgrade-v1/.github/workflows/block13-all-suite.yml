name: block13-all-suite

on:
  workflow_dispatch:
  schedule:
    - cron: "10 9 * * 1-5"

jobs:
  block13_suite:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Block 13A
        run: python block13a_entry.py
      - name: Run Block 13B
        run: python block13b_entry.py
      - name: Run Block 13C
        run: python block13c_entry.py
