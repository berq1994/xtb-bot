name: block10b-manual-ticket

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"

jobs:
  block10b_manual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Block 10B
        run: |
          python block10b_entry.py
