ai_system:
  enabled: true
  profile: "agresivni_growth"
  timezone: "Europe/Prague"
  research_language: "cs"
  max_alerts_per_day: 10
  weekly_recalibration: true
  daily_ai_commentary: true

models:
  ensemble_weights:
    momentum: 0.28
    breakout: 0.24
    mean_reversion: 0.12
    sentiment: 0.16
    regime: 0.10
    volatility: 0.10
  candidate_models:
    - momentum
    - breakout
    - mean_reversion
    - sentiment
    - regime
    - volatility
  transformer_enabled: false
  lstm_enabled: false

risk:
  volatility_target_pct: 18.0
  max_portfolio_var_pct: 5.0
  max_drawdown_soft_limit_pct: 12.0
  max_drawdown_hard_limit_pct: 18.0
  max_position_pct: 10.0
  max_sector_pct: 35.0
  max_correlation_exposure_pct: 25.0

reporting:
  executive_report: true
  dashboard_png: true
  telegram_ai_summary: true
  email_ai_summary: true

feature_store:
  path: ".state/feature_store"
  refresh_mode: "daily"

experiments:
  path: ".state/experiments"
  registry_file: ".state/model_registry.json"
  tracker_file: ".state/experiment_log.json"
