version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: xtb
      POSTGRES_PASSWORD: xtb
      POSTGRES_DB: xtb_bot
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
