name: ai-weekly-walkforward

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 6"

jobs:
  walkforward:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Walk-forward
        run: |
          python run_agent.py ai_walkforward
