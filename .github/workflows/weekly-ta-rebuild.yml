name: weekly-ta-rebuild

on:
  schedule:
    - cron: "30 7 * * 6"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas pyyaml requests
      - name: Run weekly TA rebuild
        env:
          FMP_LOW_CALL_MODE: "1"
          TIMEZONE: Europe/Prague
        run: python run_agent.py weekly_ta_rebuild
