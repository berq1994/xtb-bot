name: test-telegram-production

on:
  workflow_dispatch:

jobs:
  test-production:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_SEND_ENABLED: ${{ vars.TELEGRAM_SEND_ENABLED }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      APP_ENV: ${{ vars.APP_ENV }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run telegram live test
        run: python run_agent.py telegram_live

      - name: Run production cycle test
        run: python run_agent.py production_cycle
