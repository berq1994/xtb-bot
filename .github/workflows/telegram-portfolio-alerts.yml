name: telegram-portfolio-alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 8-20 * * 1-5"
    - cron: "0 21 * * 1-5"

concurrency:
  group: telegram-portfolio-alerts
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TIMEZONE: Europe/Prague
      TELEGRAM_SEND_ENABLED: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAMTOKEN: ${{ secrets.TELEGRAMTOKEN }}
      CHATID: ${{ secrets.CHATID }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FMPAPIKEY: ${{ secrets.FMPAPIKEY }}
      PORTFOLIO_ALERT_MIN_MOVE: "2.4"
      PORTFOLIO_ALERT_COOLDOWN_MIN: "180"
      PORTFOLIO_ALERT_MAX_ITEMS: "5"
      PORTFOLIO_ALERT_MIN_ACTIONABILITY: "4.0"
      ALERT_WINDOW_START_HOUR: "8"
      ALERT_WINDOW_END_HOUR: "21"
    steps:
      - name: Check Prague time window (08:00-21:00)
        run: |
          python - << 'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          start_hour = int(os.getenv('ALERT_WINDOW_START_HOUR', '8'))
          end_hour = int(os.getenv('ALERT_WINDOW_END_HOUR', '21'))
          now = datetime.now(ZoneInfo('Europe/Prague'))
          print('NOW_PRAGUE=', now.strftime('%Y-%m-%d %H:%M:%S %Z'))
          allowed = (start_hour <= now.hour < end_hour) or (now.hour == end_hour and now.minute == 0)
          print('ALERT_WINDOW=', f'{start_hour:02d}:00-{end_hour:02d}:00')
          if not allowed:
              raise SystemExit(0)
          PY
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: .state
          key: xtb-state-portfolio-alerts
      - name: Run Telegram portfolio alerts
        run: python run_agent.py telegram_portfolio_alerts
