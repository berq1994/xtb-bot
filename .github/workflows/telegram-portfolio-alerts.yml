name: telegram-portfolio-alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 8-21 * * 1-5"

concurrency:
  group: telegram-portfolio-alerts
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TIMEZONE: Europe/Prague
      TELEGRAM_SEND_ENABLED: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAMTOKEN: ${{ secrets.TELEGRAMTOKEN }}
      CHATID: ${{ secrets.CHATID }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FMPAPIKEY: ${{ secrets.FMPAPIKEY }}
      PORTFOLIO_ALERT_MIN_MOVE: "2.4"
      PORTFOLIO_ALERT_COOLDOWN_MIN: "180"
      PORTFOLIO_ALERT_MAX_ITEMS: "5"
    steps:
      - name: Check Prague time window (09:00-22:00)
        run: |
          python - << 'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo('Europe/Prague'))
          print('NOW_PRAGUE=', now.strftime('%Y-%m-%d %H:%M:%S %Z'))
          if not (9 <= now.hour <= 22):
              raise SystemExit(0)
          PY
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: .state
          key: xtb-state-portfolio-alerts
      - name: Run Telegram portfolio alerts
        run: python run_agent.py telegram_portfolio_alerts
