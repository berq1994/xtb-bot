name: afternoon-brief

on:
  workflow_dispatch:
  schedule:
    # 15:00 Prague ~= 14:00 UTC (v zimě). V létě může být potřeba 13:00 UTC.
    - cron: "0 14 * * 1-5"

concurrency:
  group: afternoon-brief
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run afternoon brief
        env:
          TIMEZONE: Europe/Prague
          RUN_MODE: brief
          TELEGRAMTOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHATID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FMPAPIKEY: ${{ secrets.FMP_API_KEY }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          GMAILPASSWORD: ${{ secrets.GMAILPASSWORD }}
        run: |
          python run_agent.py brief