name: block15c-autonomous-production

on:
  workflow_dispatch:
jobs:
  block15c_prod:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Block 15A
        run: python block15a_entry.py
      - name: Run Block 15B
        run: python block15b_entry.py
      - name: Run Block 15C
        run: python block15c_entry.py
