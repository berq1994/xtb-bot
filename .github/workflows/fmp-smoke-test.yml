name: fmp-smoke-test

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FMPAPIKEY: ${{ secrets.FMPAPIKEY }}
      FMP_LOW_CALL_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run FMP smoke test
        run: python run_agent.py fmp_smoke_test
