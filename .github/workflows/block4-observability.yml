name: block4-observability

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 1-5"

jobs:
  observability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-block4.txt
      - name: Monitor
        run: |
          python block4_entry.py audit
