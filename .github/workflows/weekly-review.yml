name: weekly-review

on:
  schedule:
    - cron: '45 7 * * 6'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests pyyaml pandas yfinance
      - name: Restore state cache
        id: restore_state
        uses: actions/cache/restore@v4
        with:

          path: |
            .state
            data/openbb_signal_history.jsonl
            data/outcome_tracking.jsonl
            data/autonomous_learning_state.json
            data/phase5_signal_weights.json
            data/user_feedback.jsonl
          key: xtb-state-sync-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            xtb-state-sync-${{ github.ref_name }}-
            xtb-state-sync-
      - name: Run weekly review stack
        env:
          TIMEZONE: Europe/Prague
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMPAPIKEY: ${{ secrets.FMPAPIKEY }}
          FMP_LOW_CALL_MODE: '1'
        run: |
          python run_agent.py fundamentals
          python run_agent.py macro_calendar
          python run_agent.py technical_analysis
          python run_agent.py official_sources
          python run_agent.py risk_engine
          python run_agent.py weekly_review
          python run_agent.py learning_review
      - name: Save state snapshot
        if: always()
        uses: actions/cache/save@v4
        with:

          path: |
            .state
            data/openbb_signal_history.jsonl
            data/outcome_tracking.jsonl
            data/autonomous_learning_state.json
            data/phase5_signal_weights.json
            data/user_feedback.jsonl
          key: xtb-state-sync-${{ github.ref_name }}-${{ github.run_id }}
