name: radar-agent-snapshot

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: xtb-radar
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check time window (Europe/Prague 15-21)
        id: timecheck
        run: |
          python - << 'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/Prague"))
          h = now.hour
          # povolíme 15:00 - 21:59 (tj. do 22:00 se to už nespouští)
          allowed = (h >= 15 and h <= 21)
          print("NOW_PRAGUE=", now.strftime("%Y-%m-%d %H:%M:%S %Z"))
          if not allowed:
              print("Outside allowed window. Exiting.")
              raise SystemExit(0)
          print("Inside allowed window. Continuing.")
          PY

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: .state
          key: xtb-state

      - name: Run snapshot (TG only, dedupe in agent)
        run: python run_agent.py snapshot
        env:
          TIMEZONE: Europe/Prague

          FMPAPIKEY: ${{ secrets.FMPAPIKEY }}
          FMP_API_KEY: ${{ secrets.FMPAPIKEY }}

          TELEGRAMTOKEN: ${{ secrets.TELEGRAMTOKEN }}
          CHATID: ${{ secrets.CHATID }}

          EMAIL_ENABLED: "false"
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          GMAILPASSWORD: ${{ secrets.GMAILPASSWORD }}