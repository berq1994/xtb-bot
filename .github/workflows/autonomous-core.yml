name: autonomous-core

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 6-20 * * 1-5"

concurrency:
  group: autonomous-core
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TIMEZONE: Europe/Prague
      TELEGRAM_SEND_ENABLED: "false"
      EMAIL_SEND_ENABLED: "false"
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FMPAPIKEY: ${{ secrets.FMPAPIKEY }}
      FMP_LOW_CALL_MODE: "true"
      FMP_DAILY_BUDGET: "25"
      FMP_NEWS_ENABLED: "false"
      AUTO_REBALANCE_MIN_RESOLVED: "8"
      AUTO_REBALANCE_COOLDOWN_HOURS: "24"
      AUTO_SIGNAL_COOLDOWN_MIN: "180"
      AUTO_SIGNAL_TOP_N: "2"
      NEWS_MAX_LIVE_FETCH_PER_RUN: "8"
      ACTION_QUEUE_MIN_SCORE: "3.2"
      ACTION_QUEUE_LIMIT: "5"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Restore state cache
        id: restore_state
        uses: actions/cache/restore@v4
        with:

          path: |
            .state
            data/openbb_signal_history.jsonl
            data/outcome_tracking.jsonl
            data/autonomous_learning_state.json
            data/phase5_signal_weights.json
            data/user_feedback.jsonl
          key: xtb-state-sync-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            xtb-state-sync-${{ github.ref_name }}-
            xtb-state-sync-
      - name: Run autonomous core
        run: python run_agent.py autonomous_core
      - name: Save state snapshot
        if: always()
        uses: actions/cache/save@v4
        with:

          path: |
            .state
            data/openbb_signal_history.jsonl
            data/outcome_tracking.jsonl
            data/autonomous_learning_state.json
            data/phase5_signal_weights.json
            data/user_feedback.jsonl
          key: xtb-state-sync-${{ github.ref_name }}-${{ github.run_id }}
