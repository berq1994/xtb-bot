name: autonomous-core

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 6-20 * * 1-5"

concurrency:
  group: autonomous-core
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TIMEZONE: Europe/Prague
      TELEGRAM_SEND_ENABLED: "false"
      EMAIL_SEND_ENABLED: "false"
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FMPAPIKEY: ${{ secrets.FMPAPIKEY }}
      AUTO_REBALANCE_MIN_RESOLVED: "8"
      AUTO_REBALANCE_COOLDOWN_HOURS: "24"
      AUTO_SIGNAL_COOLDOWN_MIN: "180"
      AUTO_SIGNAL_TOP_N: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: .state
          key: xtb-state-autonomous-core
      - name: Run autonomous core
        run: python run_agent.py autonomous_core
