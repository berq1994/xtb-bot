name: portfolio-news

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: xtb-portfolio-news
  cancel-in-progress: true

jobs:
  portfolio_news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check time window (Europe/Prague 15-21)
        run: |
          python - << 'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo('Europe/Prague'))
          h = now.hour
          allowed = (h >= 15 and h <= 21)
          print('NOW_PRAGUE=', now.strftime('%Y-%m-%d %H:%M:%S %Z'))
          if not allowed:
              raise SystemExit(0)
          PY

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: .state
          key: xtb-state

      - name: Run portfolio news (TG only)
        run: python run_agent.py news
        env:
          TIMEZONE: Europe/Prague
          PORTFOLIO_SNAPSHOT_PATH: portfolio_snapshot/portfolio.yml

          FMPAPIKEY: ${{ secrets.FMPAPIKEY }}
          FMP_API_KEY: ${{ secrets.FMPAPIKEY }}

          TELEGRAMTOKEN: ${{ secrets.TELEGRAMTOKEN }}
          CHATID: ${{ secrets.CHATID }}

          EMAIL_ENABLED: "false"