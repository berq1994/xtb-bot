name: block11b-intelligence-briefing

on:
  workflow_dispatch:
  schedule:
    - cron: "50 8 * * 1-5"

jobs:
  block11b_agents:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Block 11A
        run: python block11a_entry.py
      - name: Run Block 11B
        run: python block11b_entry.py
